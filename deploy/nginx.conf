# Вкус Жизни — Nginx reverse proxy
# Расположение на сервере: /etc/nginx/sites-available/vkus-zhizni
# Активация: ln -s /etc/nginx/sites-available/vkus-zhizni /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name club.nata-tomshina.ru;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_cache_bypass  $http_upgrade;
    }
}

# SSL — добавится автоматически через certbot:
# certbot --nginx -d club.nata-tomshina.ru
